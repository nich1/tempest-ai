# Canonical, prod-like Compose definition.
#
# Use `docker compose up` for the prod-like stack, or
# `docker compose -f docker-compose.yml -f docker-compose.local.yml up`
# for the dev stack with hot-reload, source mounts, and exposed ports.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tempest}
      POSTGRES_USER: ${POSTGRES_USER:-tempest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tempest} -d ${POSTGRES_DB:-tempest}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-tempest-jobs}
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    volumes:
      - ./docker/minio/bootstrap.sh:/bootstrap.sh:ro
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000

  consumers:
    build:
      context: .
      dockerfile: docker/consumers.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}

volumes:
  postgres-data:
  redis-data:
  minio-data:
